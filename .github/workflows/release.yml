name: Build and Release Module

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build module zip
        run: |
          mkdir -p build/baphomet-utils/scripts build/baphomet-utils/styles build/baphomet-utils/data build/baphomet-utils/macros
          cp module.json build/baphomet-utils/
          cp scripts/*.js build/baphomet-utils/scripts/
          cp styles/*.css build/baphomet-utils/styles/
          cp data/*.js build/baphomet-utils/data/
          cp macros/*.js build/baphomet-utils/macros/
          [ -f macros/README.md ] && cp macros/README.md build/baphomet-utils/macros/
          [ -f README.md ] && cp README.md build/baphomet-utils/
          cd build && zip -r ../baphomet-utils.zip baphomet-utils/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.tag.outputs.version }}
          body: |
            **v${{ steps.tag.outputs.version }}**

            See the [README changelog](https://github.com/Dade512/baphomet-utils/blob/main/README.md#changelog) for the full list of changes in this release.
          files: |
            baphomet-utils.zip
            module.json
